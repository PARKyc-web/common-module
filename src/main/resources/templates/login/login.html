<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JWT Login</title>
    <link rel="stylesheet" th:href="@{/css/login.css}" href="/css/login.css">
</head>
<body class="login-page">
<main class="login-shell">
    <section class="login-card">
        <span class="eyebrow">JWT Demo</span>
        <h1>로그인</h1>
        <p class="lead">아이디와 비밀번호를 입력하면 로그인 성공 후 아래에 발급된 JWT 토큰이 표시됩니다.</p>

        <form class="login-form" id="loginForm">
            <div class="field">
                <label for="loginId">아이디</label>
                <input id="loginId" name="loginId" type="text" placeholder="아이디를 입력하세요" required>
            </div>

            <div class="field">
                <label for="password">비밀번호</label>
                <input id="password" name="password" type="password" placeholder="비밀번호를 입력하세요" required>
            </div>

            <button class="submit-button" id="submitButton" type="submit">로그인</button>
        </form>

        <div class="signup-entry">
            <a class="signup-button" href="/page/sign-up">회원가입 하러가기</a>
            <p class="signup-hint">
                아직 계정이 없다면
                <a class="signup-link" href="/page/sign-up">회원가입 페이지</a>
                에서 테스트 계정을 만들어보세요.
            </p>
        </div>

        <p class="message" id="message"></p>

        <section class="token-panel" id="tokenPanel">
            <h2>로그인 응답</h2>
            <p>로그인 성공 이후에만 표시됩니다.</p>
            <pre class="token-box" id="tokenBox"></pre>
        </section>
    </section>
</main>

<script>
    const form = document.getElementById("loginForm");
    const submitButton = document.getElementById("submitButton");
    const message = document.getElementById("message");
    const tokenPanel = document.getElementById("tokenPanel");
    const tokenBox = document.getElementById("tokenBox");

    form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const loginId = form.loginId.value.trim();
        const password = form.password.value.trim();

        tokenPanel.classList.remove("is-visible");
        tokenBox.textContent = "";
        message.textContent = "";
        message.className = "message";

        if (!loginId || !password) {
            message.textContent = "아이디와 비밀번호를 모두 입력해주세요.";
            message.classList.add("is-error");
            return;
        }

        submitButton.disabled = true;
        submitButton.textContent = "로그인 처리 중...";

        try {
            const response = await fetch("/api/v1/lgn/login", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ loginId, password })
            });

            const data = await response.json();

            if (!response.ok || data.result !== "SUCCESS") {
                throw new Error(`로그인에 실패했습니다. result=${data.result || "UNKNOWN"}`);
            }

            message.textContent = `${data.loginId || loginId} 계정으로 로그인에 성공했습니다.`;
            message.classList.add("is-success");
            tokenBox.textContent =
                `result: ${data.result || ""}\n` +
                `loginId: ${data.loginId || ""}\n\n` +
                `accessToken:\n${data.accessToken || ""}\n\n` +
                `refreshToken:\n${data.refreshToken || ""}`;
            tokenPanel.classList.add("is-visible");
        } catch (error) {
            message.textContent = error.message || "로그인 처리 중 오류가 발생했습니다.";
            message.classList.add("is-error");
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = "로그인";
        }
    });
</script>
</body>
</html>
