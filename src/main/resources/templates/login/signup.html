<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Member Sign Up</title>
    <link rel="stylesheet" th:href="@{/css/signup.css}" href="/css/signup.css">
</head>
<body class="signup-page">
<main class="signup-shell">
    <section class="signup-card">
        <span class="eyebrow">Member Demo</span>
        <h1>회원가입</h1>
        <p class="lead">회원가입 API 테스트용 화면입니다. 아이디 중복 확인과 가입 요청 결과를 아래에서 바로 확인할 수 있습니다.</p>

        <form class="signup-form" id="signupForm">
            <div class="field">
                <label for="loginId">아이디</label>
                <div class="inline-field">
                    <input id="loginId" name="loginId" type="text" placeholder="가입할 아이디를 입력하세요" required>
                    <button class="secondary-button" id="checkButton" type="button">중복 확인</button>
                </div>
            </div>

            <div class="field">
                <label for="password">비밀번호</label>
                <input id="password" name="password" type="password" placeholder="비밀번호를 입력하세요" required>
            </div>

            <div class="field">
                <label for="passwordConfirm">비밀번호 확인</label>
                <input id="passwordConfirm" name="passwordConfirm" type="password" placeholder="비밀번호를 다시 입력하세요" required>
            </div>

            <button class="submit-button" id="submitButton" type="submit">회원가입</button>
        </form>

        <p class="message" id="message"></p>

        <section class="result-panel" id="resultPanel">
            <h2>응답 결과</h2>
            <p>회원가입 요청 후 서버 응답이 표시됩니다.</p>
            <pre class="result-box" id="resultBox"></pre>
        </section>
    </section>
</main>

<script>
    const form = document.getElementById("signupForm");
    const loginIdInput = document.getElementById("loginId");
    const passwordInput = document.getElementById("password");
    const passwordConfirmInput = document.getElementById("passwordConfirm");
    const checkButton = document.getElementById("checkButton");
    const submitButton = document.getElementById("submitButton");
    const message = document.getElementById("message");
    const resultPanel = document.getElementById("resultPanel");
    const resultBox = document.getElementById("resultBox");

    const resetFeedback = () => {
        message.textContent = "";
        message.className = "message";
        resultPanel.classList.remove("is-visible");
        resultBox.textContent = "";
    };

    checkButton.addEventListener("click", async () => {
        const loginId = loginIdInput.value.trim();

        resetFeedback();

        if (!loginId) {
            message.textContent = "중복 확인을 하려면 아이디를 입력해주세요.";
            message.classList.add("is-error");
            return;
        }

        checkButton.disabled = true;
        checkButton.textContent = "확인 중...";

        try {
            const response = await fetch(`/api/v1/member/check-dup-id?loginId=${encodeURIComponent(loginId)}`);
            const result = await response.text();
            const isAvailable = result.trim() === "true";

            message.textContent = isAvailable ? "사용 가능한 아이디입니다." : "이미 사용 중인 아이디입니다.";
            message.classList.add(isAvailable ? "is-success" : "is-error");
        } catch (error) {
            message.textContent = "중복 확인 중 오류가 발생했습니다.";
            message.classList.add("is-error");
        } finally {
            checkButton.disabled = false;
            checkButton.textContent = "중복 확인";
        }
    });

    form.addEventListener("submit", async (event) => {
        event.preventDefault();

        const loginId = loginIdInput.value.trim();
        const password = passwordInput.value;
        const passwordConfirm = passwordConfirmInput.value;

        resetFeedback();

        if (!loginId || !password || !passwordConfirm) {
            message.textContent = "모든 항목을 입력해주세요.";
            message.classList.add("is-error");
            return;
        }

        if (password !== passwordConfirm) {
            message.textContent = "비밀번호와 비밀번호 확인이 일치하지 않습니다.";
            message.classList.add("is-error");
            return;
        }

        submitButton.disabled = true;
        submitButton.textContent = "가입 처리 중...";

        try {
            const body = new URLSearchParams();
            body.append("loginId", loginId);
            body.append("password", password);

            const response = await fetch("/api/v1/member/sign-up", {
                method: "POST",
                headers: {
                    "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
                },
                body: body.toString()
            });

            const result = (await response.text()).trim();
            const isSuccess = response.ok && result === "SUCCESS";

            message.textContent = isSuccess ? "회원가입이 완료되었습니다." : "회원가입에 실패했습니다.";
            message.classList.add(isSuccess ? "is-success" : "is-error");
            resultBox.textContent = result || "EMPTY";
            resultPanel.classList.add("is-visible");
        } catch (error) {
            message.textContent = "회원가입 처리 중 오류가 발생했습니다.";
            message.classList.add("is-error");
        } finally {
            submitButton.disabled = false;
            submitButton.textContent = "회원가입";
        }
    });
</script>
</body>
</html>
